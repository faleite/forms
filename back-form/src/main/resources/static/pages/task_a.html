<link rel="stylesheet" href="../css/task_a.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css">


<div>
	<!-- <h1 id="title">Controle Diário</h1> -->
	
	<form id="controleDiario">
		<h1>Início</h1>

		<div class="input-box">
			<!-- <label for="name">Nome</label> -->
			<input type="text" id="name" placeholder="Nome">
			<!-- <input type="text" id="login" placeholder="Usuário (SC)" required> -->
			<i class="bx bxs-user"></i>
		</div>

		<div class="input-box">
			<!-- <label for="matricula">Matrícula</label> -->
			<input type="text" id="matricula" placeholder="Matrícula">
			<i class="bx bxs-car"></i>
		</div>
		

		<div class="input-box">
			<input type="number" id="kmIniciais" placeholder="Km Iniciais">
			<i class="bx bxs-navigation"></i>
		</div>
		

		<div class="input-box">
			<input type="text" id="giro" placeholder="Giro">
			<i class="bx bxs-map-pin"></i>
		</div>

		<div class="input-box">
			<input type="number" id="qtdObjetos" placeholder="Qtd Objetos">
			<i class="bx bxs-data"></i>
		</div>

		<div class="input-box">
			<input type="number" id="qtdRecolhas" placeholder="Qtd Recolhas">
			<i class="bx bxs-data"></i>
		</div>

		<button type="submit" class="btn" >Enviar</button>
		<div id="success" class="success"></div>
	</form>
</div>

<script src="../js/task_a.js"></script>
